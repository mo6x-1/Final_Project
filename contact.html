</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-colored fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Mido ⚡</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>

  <!-- CONTACT SECTION -->
  <section class="py-5 mt-5">
    <div class="container">
      <h2 class="text-center mb-4 fade-in">Contact Me</h2>
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-7 fade-in delay-1">
          <form onsubmit="return validateForm()" class="bg-white p-4 rounded shadow-sm">
            <div class="mb-3">
              <label for="name" class="form-label">Name</label>
              <input type="text" class="form-control" id="name" placeholder="Your Name">
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" placeholder="Your Email">
            </div>
            <div class="mb-3">
              <label for="message" class="form-label">Message</label>
              <textarea class="form-control" id="message" rows="5" placeholder="Your Message"></textarea>
            </div>
            <button type="submit" class="btn btn-glow w-100">Send Message</button>
          </form>
        </div>
      </div>
      <div class="text-center mt-4 fade-in delay-2">
        <p><i class="fas fa-envelope me-2"></i>mido@email.com</p>
        <p><i class="fas fa-phone me-2"></i>+20 123 456 7890</p>
        <div>
          <a href="#" class="text-dark me-3"><i class="fab fa-github fa-lg"></i></a>
          <a href="#" class="text-primary me-3"><i class="fab fa-linkedin fa-lg"></i></a>
          <a href="#" class="text-info"><i class="fab fa-twitter fa-lg"></i></a>
        </div>
      </div>
    </div>
  </section>
